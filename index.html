<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Hanchiko</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --primary: #2563eb; --primary-light: #dbeafe; --bg: #000; --text: #fff; --card-bg: #ffffff; }
        body { margin:0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica; background: var(--bg); color: var(--text); overflow: hidden; }

        .top-bar {
            position: fixed; top: 0; width: 100%; z-index: 1000;
            background: linear-gradient(to bottom, rgba(0,0,0,0.9) 0%, rgba(0,0,0,0) 100%);
            backdrop-filter: blur(8px); padding-top: 5px;
        }

        header {
            padding: 5px 0; text-align: center; font-size: 14px; font-weight: 800;
            display: flex; justify-content: center; align-items: center;
            letter-spacing: 1.5px; color: white; text-shadow: 0 2px 4px rgba(0,0,0,0.5);
            text-transform: uppercase;
        }

        nav { display: flex; overflow-x: auto; padding: 5px 15px; gap: 8px; scrollbar-width: none; align-items: center; }
        nav::-webkit-scrollbar { display: none; }
        
        nav button {
            background: rgba(255,255,255,0.15); border: 0.5px solid rgba(255,255,255,0.3); 
            color: white; padding: 4px 12px; border-radius: 15px; font-size: 9.5px; 
            cursor: pointer; flex-shrink: 0; font-weight: 600; text-transform: uppercase;
            backdrop-filter: blur(10px);
        }

        .container {
            height: 100vh; width: 100vw; overflow-y: scroll;
            scroll-snap-type: y mandatory; 
            scroll-behavior: smooth;
            -webkit-overflow-scrolling: touch;
        }

        .page { display: none; height: 100%; }
        .page.active { display: block; }

        .card {
            position: relative; width: 100%; height: 100vh;
            scroll-snap-align: start; 
            scroll-snap-stop: always;
            display: flex; align-items: center;
            justify-content: center; background: #000;
        }

        video, img { max-width: 100%; max-height: 100%; object-fit: contain; background: #000; }

        /* Status Tag Styles - Now positioned for the bottom overlay */
        .status-tag {
            padding: 2px 8px; border-radius: 4px;
            font-size: 9px; font-weight: 800; text-transform: uppercase;
            display: inline-block; margin-bottom: 4px;
        }
        .tag-live { background: #22c55e; color: white; }
        .tag-soon { background: #f59e0b; color: white; animation: blink 1s infinite; }
        .tag-expired { background: #ff0000; color: white; }

        @keyframes blink { 0% {opacity: 1;} 50% {opacity: 0.5;} 100% {opacity: 1;} }

        .mute-indicator {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: rgba(0, 0, 0, 0.6); color: white; padding: 15px 20px;
            border-radius: 50px; font-size: 14px; font-weight: 600;
            display: flex; align-items: center; gap: 10px; z-index: 20;
            pointer-events: none; backdrop-filter: blur(4px);
            border: 1px solid rgba(255,255,255,0.2); transition: opacity 0.3s ease;
        }
        body.unmuted .mute-indicator { opacity: 0 !important; visibility: hidden; }

        .play-status-icon {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            font-size: 60px; color: rgba(255,255,255,0.5); opacity: 0;
            pointer-events: none; z-index: 21; transition: opacity 0.2s;
        }

        .overlay {
            position: absolute; bottom: 120px; left: 15px; right: 80px;
            color: white; text-shadow: 0 1px 4px rgba(0,0,0,0.8); z-index: 10;
            display: flex; flex-direction: column; align-items: flex-start;
        }
        .overlay h2 { 
            margin: 0; font-size: 11px; color: #fff; background: var(--primary); 
            display: inline-block; padding: 4px 10px; border-radius: 4px; 
            text-transform: uppercase; font-weight: 800;
        }

        .actions {
            position: absolute; right: 15px; bottom: 110px;
            display: flex; flex-direction: column; gap: 15px; z-index: 11;
        }
        .actions button {
            background: rgba(255, 255, 255, 0.2); border: 1px solid rgba(255, 255, 255, 0.4); 
            color: white; font-size: 20px; cursor: pointer; width: 48px; height: 48px;
            border-radius: 50%; display: flex; align-items: center;
            justify-content: center; backdrop-filter: blur(10px);
        }
        .actions .btn-wa { color: #25D366; border-color: rgba(37, 211, 102, 0.4); }

        .desc-modal {
            position: fixed; bottom: -100%; left: 0; width: 100%; height: 50%;
            background: rgba(0,0,0,0.95); z-index: 2001; border-top-left-radius: 20px;
            border-top-right-radius: 20px; padding: 25px; transition: 0.3s ease;
            box-shadow: 0 -5px 15px rgba(0,0,0,0.5); box-sizing: border-box;
            overflow-y: auto; color: white; border-top: 1px solid rgba(255,255,255,0.1);
        }
        .desc-modal.open { bottom: 0; }
        .desc-modal h3 { margin-top: 0; font-size: 16px; border-bottom: 1px solid #333; padding-bottom: 10px; }
        .desc-modal p { font-size: 14px; line-height: 1.6; color: #ccc; white-space: pre-wrap; }
        .desc-modal a { color: var(--primary); text-decoration: underline; }
        .close-desc { position: absolute; top: 15px; right: 20px; font-size: 24px; cursor: pointer; }

        #loader { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); z-index: 2000; display: none; }
        .spinner { width: 40px; height: 40px; border: 4px solid rgba(255,255,255,0.1); border-top: 4px solid var(--primary); border-radius: 50%; animation: spin 0.8s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        .create-container { 
            height: 100vh; background: #0f172a; 
            display: flex; flex-direction: column; 
            justify-content: flex-end;
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
        }
        .form-card {
            background: var(--card-bg); color: #1e293b;
            width: 100%; padding: 30px 25px 120px 25px;
            border-top-left-radius: 30px; border-top-right-radius: 30px;
            box-shadow: 0 -10px 40px rgba(0,0,0,0.4);
            animation: slideUp 0.6s cubic-bezier(0.2, 0.8, 0.2, 1);
            box-sizing: border-box;
        }
        @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }

        .form-card h2 { margin: 0 0 5px 0; font-size: 22px; font-weight: 800; color: #0f172a; }
        .form-card p { margin: 0 0 25px 0; font-size: 13px; color: #64748b; font-weight: 500; }

        .input-group { position: relative; margin-bottom: 18px; }
        .input-group i { position: absolute; left: 15px; top: 15px; color: #94a3b8; transition: 0.3s; }
        
        .form-card input, .form-card select, .form-card textarea {
            width: 100%; padding: 14px 15px 14px 45px;
            border: 2px solid #f1f5f9; border-radius: 14px;
            background: #f8fafc; font-size: 15px; font-weight: 500;
            box-sizing: border-box; outline: none; transition: 0.3s;
        }

        .form-card input:focus, .form-card select:focus, .form-card textarea:focus {
            border-color: var(--primary); background: #fff; box-shadow: 0 0 0 4px var(--primary-light);
        }
        .form-card input:focus + i { color: var(--primary); }

        .submit-btn-new {
            background: var(--primary); color: white;
            width: 100%; padding: 18px; border: none; border-radius: 16px;
            font-size: 16px; font-weight: 700; cursor: pointer;
            display: flex; align-items: center; justify-content: center; gap: 10px;
            transition: 0.3s; box-shadow: 0 10px 20px rgba(37, 99, 235, 0.2);
            margin-top: 10px;
        }
        .submit-btn-new:active { transform: scale(0.96); opacity: 0.9; }

        footer {
            position: fixed; bottom: 0; width: 100%;
            background: linear-gradient(to top, rgba(0,0,0,1) 0%, rgba(0,0,0,0.8) 100%);
            border-top: 0.5px solid rgba(255,255,255,0.1);
            display: flex; justify-content: space-around; padding: 12px 0 25px 0; z-index: 1001;
        }
        footer button { background:none; border:none; color: #888; font-size: 10px; font-weight: 700; cursor: pointer; position: relative; }
        footer button.active-btn { color: white; }
        footer button.active-btn::after { content: ''; position: absolute; top: -12px; left: 0; right: 0; height: 2px; background: white; }

        .notification-badge {
            position: absolute; top: -10px; right: -8px;
            background: #ff3b30; color: white; font-size: 9px;
            padding: 2px 5px; border-radius: 10px; font-weight: bold;
            border: 1.5px solid #000; display: none;
            animation: bounce 2s infinite;
        }
    </style>
</head>
<body>

<div id="loader"><div class="spinner"></div></div>

<div id="descriptionModal" class="desc-modal">
    <span class="close-desc" onclick="toggleDesc()">&times;</span>
    <h3 id="modalTitle">Details</h3>
    <p id="modalContent"></p>
</div>

<div class="top-bar" id="topBar">
    <header>HANCHIKO.COM</header>
    <nav id="topNav">
        <button onclick="applyFilter('motivation')">Motivation</button>
        <button onclick="applyFilter('exam')">Exams / Jobs</button>
        <button onclick="applyFilter('serve')">Serve</button>
        <button onclick="applyFilter('sale')">Sale / Rent</button>
    </nav>
</div>

<div class="container" id="mainContainer">
    <div id="feedPage" class="page active">
        <div id="postContainer"></div>
    </div>
    
    <div id="createPage" class="page">
        <div class="create-container">
            <div class="form-card">
                <h2>Create Post</h2>
                <p>Fill the details to post on Hanchiko</p>
                
                <div class="input-group">
                    <i class="fa-solid fa-user"></i>
                    <input id="name" type="text" placeholder="Your Name">
                </div>
                
                <div class="input-group">
                    <i class="fa-solid fa-phone"></i>
                    <input id="phone" type="tel" placeholder="Phone Number">
                </div>
                
                <div class="input-group">
                    <i class="fa-solid fa-layer-group"></i>
                    <select id="category">
                        <option value="motivation">Motivation</option>
                        <option value="exam">Exams/Jobs</option>
                        <option value="serve">Serve</option>
                        <option value="sale">Sales/Rent</option>
                        <option value="invitation">Invitation</option>
                    </select>
                </div>
                
                <div class="input-group">
                    <i class="fa-solid fa-pen-to-square" style="top: 20px;"></i>
                    <textarea id="details" rows="3" placeholder="Enter post details..."></textarea>
                </div>
                
                <button class="submit-btn-new" onclick="submitForm()">
                    Post to WhatsApp <i class="fa-brands fa-whatsapp"></i>
                </button>
            </div>
        </div>
    </div>
</div>

<footer>
    <button id="btn-feed" class="active-btn" onclick="applyFilter('all')">ALL</button>
    <button id="btn-create" onclick="showPage('createPage')">CREATE</button>
    <button id="btn-invitation" onclick="handleInviteClick()">
        INVITATION
        <span id="invite-badge" class="notification-badge"></span>
    </button>
</footer>

<script>
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwCLCw8eWTUlzzQlEVCrXq19podhcsXBjxPYZwKQagv0ebrlmxdLYfojC9uiNe9-JgM/exec";
    
    let masterRawData = []; 
    let filteredData = [];  
    let displayedCount = 0; 
    const batchSize = 5;    
    let isMuted = true;
    let isLoading = false;

    function linkify(text) {
        if(!text) return "";
        const urlPattern = /(\b(https?|ftp|file):\/\/[-A-Z0-9+&@#\/%?=~_|!:,.;]*[-A-Z0-9+&@#\/%=~_|])/ig;
        return text.toString().replace(urlPattern, '<a href="$1" target="_blank">$1</a>');
    }

    function toggleDesc(title = "", content = "") {
        const modal = document.getElementById('descriptionModal');
        if (title) {
            document.getElementById('modalTitle').innerText = title;
            document.getElementById('modalContent').innerHTML = linkify(content);
            modal.classList.add('open');
        } else {
            modal.classList.remove('open');
        }
    }

    function showLoader(show) {
        document.getElementById('loader').style.display = show ? 'block' : 'none';
    }

    function shuffleArray(array) {
        let shuffled = [...array];
        for (let i = shuffled.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
        }
        return shuffled;
    }

    const videoObserver = new IntersectionObserver((entries) => {
        entries.forEach(entry => {
            const video = entry.target.querySelector('video');
            if (video) {
                if (entry.isIntersecting) {
                    video.muted = isMuted;
                    video.play().catch(e => {});
                } else {
                    video.pause();
                }
            }
        });
    }, { threshold: 0.8 });

    function getExpiryStatus(dateStr) {
        if (!dateStr || dateStr === "" || dateStr === "(blank)") return { label: "", class: "", expired: false };
        try {
            const expiry = new Date(dateStr);
            if (isNaN(expiry.getTime())) return { label: "", class: "", expired: false };
            const today = new Date();
            today.setHours(0,0,0,0);
            expiry.setHours(0,0,0,0);
            const diffDays = Math.ceil((expiry - today) / (1000 * 60 * 60 * 24));
            if (diffDays < 0) return { label: "Expired", class: "tag-expired", expired: true };
            if (diffDays <= 2) return { label: "Ending Soon", class: "tag-soon", expired: false };
            return { label: "Active", class: "tag-live", expired: false };
        } catch(e) { return { label: "", class: "", expired: false }; }
    }

    function loadMore() {
        if (isLoading) return;
        
        // Infinite Scroll Logic: Reset counter if at end
        if (displayedCount >= filteredData.length && filteredData.length > 0) { 
            displayedCount = 0; 
        }
        
        isLoading = true;
        showLoader(true);
        const container = document.getElementById("postContainer");
        const nextBatch = filteredData.slice(displayedCount, displayedCount + batchSize);
        
        nextBatch.forEach(post => {
            const status = getExpiryStatus(post.Expiry_Date);
            let mediaHTML = "";
            if (post.Media_Type === "video" && post.Media_URL && post.Media_URL !== "(blank)") {
                mediaHTML = `<video src="${post.Media_URL}" loop playsinline preload="auto" ${isMuted ? "muted" : ""}></video>
                             <div class="mute-indicator"><i class="fa-solid fa-volume-xmark"></i> Tap for sound</div>
                             <div class="play-status-icon"></div>`;
            } else if (post.Media_Type === "image" && post.Media_URL && post.Media_URL !== "(blank)") {
                mediaHTML = `<img src="${post.Media_URL}" loading="lazy">`;
            } else {
                mediaHTML = `<div style="padding:40px; text-align:center; font-size:18px;">${post.Details}</div>`;
            }

            const card = document.createElement('div');
            card.className = 'card';
            card.onclick = function(e) { 
                if (e.target.closest('button')) return;
                const video = this.querySelector('video');
                if (video) {
                    if (isMuted) { unmuteAll(); video.play(); }
                    else {
                        const playIcon = this.querySelector('.play-status-icon');
                        if (video.paused) { video.play(); }
                        else { video.pause(); }
                        playIcon.style.opacity = '1';
                        setTimeout(() => { playIcon.style.opacity = '0'; }, 500);
                    }
                }
            };

            card.innerHTML = `
                ${mediaHTML}
                <div class="overlay">
                    ${status.label ? `<div class="status-tag ${status.class}">${status.label}</div>` : ''}
                    <h2>${post.Category}</h2>
                </div>
                <div class="actions">
                    <button onclick="event.stopPropagation(); toggleDesc('${post.Category}', '${post.Details.replace(/'/g, "\\'").replace(/\n/g, "<br>")}')">
                        <i class="fa-solid fa-circle-info"></i>
                    </button>
                    <button class="btn-wa" onclick="event.stopPropagation(); share('${post.ID}')">
                        <i class="fa-brands fa-whatsapp"></i>
                    </button>
                </div>`;
            container.appendChild(card);
            videoObserver.observe(card);
        });
        displayedCount += nextBatch.length;
        isLoading = false;
        showLoader(false);
    }

    function applyFilter(type) {
        toggleDesc(); 
        showPage('feedPage');
        const container = document.getElementById("postContainer");
        container.innerHTML = "";
        displayedCount = 0;

        let list = (type === 'all') ? masterRawData : masterRawData.filter(post => {
            if (!post.Category) return false;
            const itemCat = post.Category.toString().toLowerCase().trim();
            const filterTarget = type.toLowerCase().trim();
            return itemCat === filterTarget || itemCat.includes(filterTarget) || filterTarget.includes(itemCat);
        });

        // Deep linking logic for referrals
        const urlParams = new URLSearchParams(window.location.search);
        const refId = urlParams.get('id');
        
        const live = list.filter(p => !getExpiryStatus(p.Expiry_Date).expired);
        const expired = list.filter(p => getExpiryStatus(p.Expiry_Date).expired);
        let sorted = [...shuffleArray(live), ...expired];

        if(refId && type === 'all') {
            const refIdx = sorted.findIndex(p => p.ID.toString() === refId);
            if(refIdx > -1) {
                const refPost = sorted.splice(refIdx, 1)[0];
                sorted.unshift(refPost);
            }
        }

        filteredData = sorted;
        loadMore();
        document.getElementById('mainContainer').scrollTop = 0;
        document.querySelectorAll('footer button').forEach(b => b.classList.remove('active-btn'));
        if(type === 'all') document.getElementById('btn-feed').classList.add('active-btn');
    }

    function unmuteAll() {
        isMuted = false;
        document.body.classList.add('unmuted');
        document.querySelectorAll('video').forEach(v => { v.muted = false; });
    }

    function showPage(pageId) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.getElementById(pageId).classList.add('active');
        if(pageId !== 'feedPage') {
            document.querySelectorAll('video').forEach(v => v.pause());
            document.getElementById('topBar').style.display = 'none';
        } else {
            document.getElementById('topBar').style.display = 'block';
        }
        
        document.querySelectorAll('footer button').forEach(b => b.classList.remove('active-btn'));
        if(pageId === 'createPage') document.getElementById('btn-create').classList.add('active-btn');
    }

    function handleInviteClick() {
        document.getElementById('invite-badge').style.display = 'none';
        sessionStorage.setItem('seenBadge', 'true');
        applyFilter('invitation');
        document.getElementById('btn-invitation').classList.add('active-btn');
    }

    document.getElementById('mainContainer').addEventListener('scroll', function() {
        if (this.scrollHeight - (this.scrollTop + this.clientHeight) < 100) loadMore();
    });

    showLoader(true);
    fetch(SCRIPT_URL)
        .then(res => res.json())
        .then(data => {
            masterRawData = data;
            applyFilter('all');
            if (!sessionStorage.getItem('seenBadge')) {
                const badge = document.getElementById('invite-badge');
                badge.innerText = Math.floor(Math.random() * 4) + 1;
                badge.style.display = 'block';
            }
        })
        .finally(() => showLoader(false));

    function share(id) { 
        const link = window.location.origin + window.location.pathname + "?id=" + id;
        window.open(`https://wa.me/?text=${encodeURIComponent('Check this on Hanchiko: ' + link)}`); 
    }

    function submitForm() {
        let n = document.getElementById('name').value, p = document.getElementById('phone').value, c = document.getElementById('category').value, i = document.getElementById('details').value;
        if(!n || !p || !i) { alert("Please fill all fields"); return; }
        window.open(`https://wa.me/919449954770?text=${encodeURIComponent(`*New Request from Hanchiko*\n\n*Name:* ${n}\n*Phone:* ${p}\n*Category:* ${c}\n*Info:* ${i}`)}`, '_blank');
    }
</script>
</body>
</html>
